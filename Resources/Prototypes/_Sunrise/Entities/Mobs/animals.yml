- type: entity
  parent: [SimpleMobBase, StripableInventoryBase, BaseSpeciesPickupable]
  id: MobKitsuneFox
  name: kitsune-mob-name
  description: kitsune-mob-description
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: Fish/nine_tailed_fox.rsi
    layers:
    - state: fox
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50 #They actually are pretty light, I looked it up
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 6
  - type: Inventory
    speciesId: fox
    templateId: pet
  - type: InteractionPopup
    successChance: 0.5
    interactSuccessString: petting-success-soft-floofy
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      collection: Fox
  - type: Grammar
    attributes:
      gender: epicene
  - type: ComplexInteraction
  - type: TTS
    voice: KateSmirnovaTB
  - type: MeleeWeapon
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Piercing: 9
  - type: NpcFactionMember
    factions:
    - Passive
  - type: NPCRetaliation
    attackMemoryLength: 10
  - type: HTN
    rootTask:
      task: RuminantHostileCompound
  - type: Carriable
    requiresNestingMob: true
  - type: CanEscapeInventory
  - type: Damageable
    damageModifierSet: Kitsune
  - type: Speech
    speechSounds: Vulpkanin
    speechVerb: Vulpkanin
    allowedEmotes: [ 'Bark', 'Snarl', 'Whine', 'Howl', 'Growl' ]
  - type: Vocal
    sounds:
      Male: MaleVulpkanin
      Female: FemaleVulpkanin
      Unsexed: MaleVulpkanin

# Player-transformed Kitsune form with dual sprite layers for color + white parts
- type: entity
  parent: MobKitsuneFox
  id: MobKitsunePlayerFox
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: Fish/nine_tailed_fox.rsi
    layers:
    - state: nine-tail_fox_gray_color
    - state: nine-tail_fox_gray_white
